<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>तू है कहाँ!</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --pink:   #ff3cac;
    --orange: #ff8c00;
    --yellow: #ffe600;
    --green:  #00f5a0;
    --cyan:   #00d4ff;
    --blue:   #4f46e5;
    --white:  #ffffff;
    --bg:     #0d0d1a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }


  .bg-photo {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image: url("bgimg.jpeg");
    background-size: cover;
    background-position: center center;
    opacity: 1;
    filter: none;
}

  .bg-blobs { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.35; animation:blobFloat 8s ease-in-out infinite; }
  .blob1 { width:420px;height:420px;background:var(--pink);  top:-100px;left:-100px;animation-delay:0s; }
  .blob2 { width:350px;height:350px;background:var(--cyan);  bottom:-80px;right:-80px;animation-delay:-2.5s; }
  .blob3 { width:300px;height:300px;background:var(--yellow);top:40%;left:60%;animation-delay:-5s; }
  .blob4 { width:260px;height:260px;background:var(--green); bottom:20%;left:5%;animation-delay:-3.5s; }

  @keyframes blobFloat {
    0%,100% { transform:translate(0,0) scale(1); }
    33%      { transform:translate(30px,-20px) scale(1.05); }
    66%      { transform:translate(-20px,30px) scale(0.95); }
  }

  .dots-bg { display:none; }



  /* HEADER */

  .logo {
    font-family:'Boogaloo',cursive; font-size:3.2rem; line-height:1.3; padding-top:0.3rem;
    background:linear-gradient(90deg,var(--pink),var(--orange),var(--yellow),var(--green),var(--cyan));
    background-size:200%;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation:rainbowShift 3s linear infinite;
    filter:drop-shadow(0 4px 20px rgba(255,60,172,0.4));
  }

  @keyframes rainbowShift { 0%{background-position:0%} 100%{background-position:200%} }

  .tagline {
    font-size:0.78rem; font-weight:800; letter-spacing:0.3em;
    text-transform:uppercase; color:rgba(255,255,255,0.45); margin-top:0.3rem;
  }

  /* VINYL GLOBE PLAY BUTTON */
  .vinyl-btn-wrap {
  position: fixed;
  top: 2rem;
  right: 3rem;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;   /* centers text under the image */
  gap: 0.4rem;
}

  .vinyl-globe {
    width: 160px;
    height: 160px;
    object-fit: contain;
    cursor: pointer;
    border-radius: 50%;
    transition: filter 0.3s;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
  }

  .vinyl-globe:hover {
    filter: drop-shadow(0 0 24px rgba(255,60,172,0.7)) drop-shadow(0 8px 24px rgba(0,0,0,0.5));
  }

  .vinyl-hint {
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  text-align: center;   /* ensures centered below image */
  margin-top: 2px;
}

  .now-playing-row {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    min-height: 1.4em;
  }

  .now-playing {
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--yellow);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    flex: 1;
  }

  .seek-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    color: rgba(255,255,255,0.75);
    font-size: 0.55rem;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    padding: 0.18rem 0.42rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .seek-btn:hover {
    background: rgba(255,60,172,0.35);
    color: #fff;
    border-color: var(--pink);
  }

  /* TITLE OVERLAY */
  .title-overlay {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  /* PLAYER - removed */

  /* QR */
  .qr-section {
    background:rgba(13,13,26,0.85);border:2px solid rgba(255,255,255,0.1);
    border-radius:28px;padding:1.5rem;display:none;
    position:fixed; bottom:2rem; right:2rem; width:380px; max-width:90vw;
    z-index:10; overflow:hidden;
    backdrop-filter: blur(12px);
  }
  .qr-section.active { display:block; animation:popIn 0.5s 0.1s cubic-bezier(.175,.885,.32,1.275) both; }

  .qr-section::before {
    content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--green),var(--cyan),var(--blue),var(--pink));
    background-size:200%;animation:rainbowShift 2s linear infinite reverse;
  }

  .section-label {
    font-size:0.7rem;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;
    margin-bottom:1.2rem;display:flex;align-items:center;gap:0.6rem;
  }
  .label-dot {
    width:8px;height:8px;border-radius:50%;background:var(--green);
    box-shadow:0 0 10px var(--green);animation:blink 1.2s ease-in-out infinite;flex-shrink:0;
  }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.7);} }

  .qr-body { display:flex;align-items:center;gap:1.4rem; }

  #qr-code {
    background:white;padding:10px;border-radius:14px;flex-shrink:0;
    width:136px;height:136px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 3px var(--yellow),0 8px 30px rgba(255,230,0,0.3);
  }
  #qr-code canvas,#qr-code img { width:116px!important;height:116px!important; }

  .qr-right { flex:1;min-width:0; }
  .qr-title { font-size:1rem;font-weight:900;color:var(--white);margin-bottom:0.3rem; }
  .qr-hint { font-size:0.7rem;font-weight:600;color:rgba(255,255,255,0.4);line-height:1.5;margin-bottom:0.75rem; }

  .url-pill {
    display:block;background:rgba(0,245,160,0.08);border:1px solid rgba(0,245,160,0.25);
    border-radius:8px;padding:0.4rem 0.7rem;font-size:0.6rem;font-weight:700;
    color:var(--green);word-break:break-all;margin-bottom:0.8rem;letter-spacing:0.02em;
  }

  .btn-row { display:flex;gap:0.5rem;flex-wrap:wrap; }

  .btn {
    font-family:'Nunito',sans-serif;font-size:0.72rem;font-weight:800;
    padding:0.45rem 1rem;border-radius:999px;border:none;cursor:pointer;
    transition:all 0.2s;letter-spacing:0.05em;
  }
  .btn-pink { background:linear-gradient(135deg,var(--pink),var(--orange));color:white;box-shadow:0 4px 18px rgba(255,60,172,0.4); }
  .btn-pink:hover { transform:translateY(-2px) scale(1.04);box-shadow:0 8px 28px rgba(255,60,172,0.55); }
  .btn-outline { background:transparent;color:rgba(255,255,255,0.55);border:2px solid rgba(255,255,255,0.15); }
  .btn-outline:hover { border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px); }
  .btn-cyan { background:linear-gradient(135deg,var(--cyan),var(--green));color:#0d0d1a;box-shadow:0 4px 18px rgba(0,212,255,0.35); }
  .btn-cyan:hover { transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,245,160,0.45); }

  .custom-url-box { margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid rgba(255,255,255,0.08); }
  .input-label { font-size:0.62rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:0.5rem;display:block; }
  .input-row { display:flex;gap:0.5rem; }

  .url-input {
    flex:1;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);
    border-radius:12px;color:white;font-family:'Nunito',sans-serif;font-size:0.75rem;
    font-weight:600;padding:0.55rem 0.85rem;outline:none;transition:border-color 0.2s;
  }
  .url-input:focus { border-color:var(--cyan); }
  .url-input::placeholder { color:rgba(255,255,255,0.2); }

  @keyframes popIn {
    from{opacity:0;transform:scale(0.88) translateY(12px);}
    to{opacity:1;transform:scale(1) translateY(0);}
  }

  .footer {
    text-align:center;margin-top:2.5rem;font-size:0.65rem;font-weight:700;
    letter-spacing:0.15em;color:rgba(255,255,255,0.2);text-transform:uppercase;
    animation:popIn 0.6s 0.3s both;
  }
  .footer span {
    background:linear-gradient(90deg,var(--pink),var(--cyan));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }

  /* MOBILE */
  @media (max-width: 480px) {
    .vinyl-btn-wrap {
      position: fixed;
      top: auto;
      bottom: 1.5rem;
      right: 50%;
      transform: translateX(50%);
      width: 90vw;
      max-width: 320px;
    }

    .vinyl-globe {
      width: 120px;
      height: 120px;
    }

    .title-overlay {
      top: 1rem;
      width: 90vw;
    }

    .logo {
      font-size: 2.1rem;
    }

    .vinyl-hint {
      font-size: 0.72rem;
    }

    .seek-btn {
      font-size: 0.62rem;
      padding: 0.25rem 0.55rem;
    }

    .blob1 { width:220px;height:220px; }
    .blob2 { width:180px;height:180px; }
    .blob3 { width:160px;height:160px; }
    .blob4 { width:140px;height:140px; }
  }
</style>
</head>


<body>

<div class="bg-photo"></div>
<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
</div>
<div class="dots-bg"></div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="audio/*" style="display:none">

<!-- Vinyl globe play button - top left area -->
<div class="vinyl-btn-wrap" id="vinyl-btn-wrap">
  <img src="giphy.gif" class="vinyl-globe" id="vinyl-globe" onclick="onVinylClick()" title="Click to load a track">
  <div class="vinyl-hint" id="vinyl-hint">Click Here</div>
  <div class="now-playing-row">
    <button class="seek-btn" onclick="seekBy(-10)">−10s</button>
    <div class="now-playing" id="now-playing"></div>
    <button class="seek-btn" onclick="seekBy(10)">+10s</button>
  </div>
</div>

<!-- Title overlay -->
<div class="title-overlay">
  <div class="logo">तू है कहाँ! 🎭</div>
</div>

<!-- QR Section -->
<div class="qr-section" id="qr-section">
  <div class="section-label">
    <div class="label-dot"></div>
    <span style="color:rgba(255,255,255,0.6)">QR Code — Share this page</span>
  </div>
  <div class="qr-body">
    <div id="qr-code"></div>
    <div class="qr-right">
      <div class="qr-title">Scan &amp; vibe! 📱</div>
      <div class="qr-hint">This is the QR of the page's current URL. Host this file online and anyone can scan to listen!</div>
      <code class="url-pill" id="qr-url-display"></code>
      <div class="btn-row">
        <button class="btn btn-pink" onclick="downloadQR()">⬇ Save QR</button>
        <button class="btn btn-outline" onclick="copyURL(event)">⎘ Copy URL</button>
      </div>
    </div>
  </div>
  <div class="custom-url-box">
    <label class="input-label">🔗 Generate QR for a custom URL</label>
    <div class="input-row">
      <input type="text" class="url-input" id="custom-url" placeholder="https://your-hosted-page.com">
      <button class="btn btn-cyan" onclick="generateCustomQR()">Go!</button>
    </div>
  </div>
</div>

<audio id="audio-player"></audio>

<script>
  const audio = document.getElementById('audio-player');
  let isPlaying = false, trackLoaded = false;

  function onVinylClick() {
    if (!trackLoaded) {
      audio.src = "nadiya.mp3";
      audio.load();
      trackLoaded = true;
    }
    if (isPlaying) {
      audio.pause();
      document.getElementById('vinyl-hint').textContent = '▶ Play';
      document.getElementById('now-playing').textContent = '';
    } else {
      audio.play().catch(() => {});
      document.getElementById('vinyl-hint').textContent = '⏸ Pause';
      document.getElementById('now-playing').textContent = 'Now Playing ♪';
    }
    isPlaying = !isPlaying;
  }

  audio.addEventListener('ended', () => {
    isPlaying = false;
    document.getElementById('vinyl-hint').textContent = '▶ Play';
    document.getElementById('now-playing').textContent = '';
  });

  function seekBy(secs) {
    if (audio.readyState >= 2) {
      audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + secs));
    }
  }
</script>

</body>
</html>
