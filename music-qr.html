  .bg-blobs { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.35; animation:blobFloat 8s ease-in-out infinite; }
  .blob1 { width:420px;height:420px;background:var(--pink);  top:-100px;left:-100px;animation-delay:0s; }
  .blob2 { width:350px;height:350px;background:var(--cyan);  bottom:-80px;right:-80px;animation-delay:-2.5s; }
  .blob3 { width:300px;height:300px;background:var(--yellow);top:40%;left:60%;animation-delay:-5s; }
  .blob4 { width:260px;height:260px;background:var(--green); bottom:20%;left:5%;animation-delay:-3.5s; }

  @keyframes blobFloat {
    0%,100% { transform:translate(0,0) scale(1); }
    33%      { transform:translate(30px,-20px) scale(1.05); }
    66%      { transform:translate(-20px,30px) scale(0.95); }
  }

  .dots-bg { display:none; }



  /* HEADER */

  .logo {
    font-family:'Boogaloo',cursive; font-size:3.2rem; line-height:1.3; padding-top:0.3rem;
    background:linear-gradient(90deg,var(--pink),var(--orange),var(--yellow),var(--green),var(--cyan));
    background-size:200%;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation:rainbowShift 3s linear infinite;
    filter:drop-shadow(0 4px 20px rgba(255,60,172,0.4));
  }

  @keyframes rainbowShift { 0%{background-position:0%} 100%{background-position:200%} }

  .tagline {
    font-size:0.78rem; font-weight:800; letter-spacing:0.3em;
    text-transform:uppercase; color:rgba(255,255,255,0.45); margin-top:0.3rem;
  }

  /* VINYL GLOBE PLAY BUTTON */
  .vinyl-btn-wrap {
    position: fixed;
    top: 2rem;
    right: 3rem;        /* move to right side */
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-end;  /* keep content aligned to the right */
    gap: 0.5rem;
  }

  .vinyl-globe {
    width: 160px;
    height: 160px;
    object-fit: contain;
    cursor: pointer;
    border-radius: 50%;
    transition: transform 0.3s, filter 0.3s;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
    animation: vinylSpin 8s linear infinite paused;
    transform-origin: center center;
  }

  .vinyl-globe.playing {
    animation-play-state: running;
  }

  @keyframes vinylSpin {
    to { transform: rotate(360deg); }
  }

  .vinyl-globe:hover {
    filter: drop-shadow(0 0 24px rgba(255,60,172,0.7)) drop-shadow(0 8px 24px rgba(0,0,0,0.5));
    transform: scale(1.06);
  }

  .vinyl-hint {
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    text-align: center;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  .now-playing {
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--yellow);
    text-align: center;
    max-width: 160px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    min-height: 1em;
  }

  /* TITLE OVERLAY */
  .title-overlay {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  /* PLAYER */
  .player-card {
    background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.1);
    border-radius:28px; padding:1.8rem; margin-top:1.2rem;
    display:none; position:relative; overflow:hidden;
  }
  .player-card.active { display:block; animation:popIn 0.5s cubic-bezier(.175,.885,.32,1.275) both; }

  .player-card::before {
    content:''; position:absolute; top:0;left:0;right:0; height:4px;
    background:linear-gradient(90deg,var(--pink),var(--orange),var(--yellow),var(--green),var(--cyan),var(--blue));
    background-size:200%; animation:rainbowShift 2s linear infinite;
  }

  .track-row { display:flex;align-items:center;gap:1.1rem;margin-bottom:1.4rem; }

  .vinyl {
    width:56px;height:56px;border-radius:50%;flex-shrink:0;position:relative;
    background:conic-gradient(var(--pink) 0deg 60deg,var(--orange) 60deg 120deg,var(--yellow) 120deg 180deg,var(--green) 180deg 240deg,var(--cyan) 240deg 300deg,var(--blue) 300deg 360deg);
    animation:spin 3s linear infinite paused;
    box-shadow:0 0 24px rgba(255,60,172,0.5);
  }
  .vinyl::after { content:'';position:absolute;inset:10px;background:#111;border-radius:50%;border:2px solid rgba(255,255,255,0.1); }
  .vinyl.playing { animation-play-state:running; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .track-name { font-size:1.05rem;font-weight:900;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px; }
  .track-meta { font-size:0.68rem;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:0.1em;margin-top:0.2rem; }

  .controls { display:flex;align-items:center;gap:1rem; }

  .play-btn {
    width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:1.2rem;flex-shrink:0;
    background:linear-gradient(135deg,var(--pink),var(--orange));color:white;
    display:flex;align-items:center;justify-content:center;transition:all 0.2s;
    box-shadow:0 6px 24px rgba(255,60,172,0.5);animation:playPulse 2s ease-in-out infinite;
  }
  @keyframes playPulse {
    0%,100%{box-shadow:0 6px 24px rgba(255,60,172,0.5);}
    50%{box-shadow:0 6px 40px rgba(255,140,0,0.7);}
  }
  .play-btn:hover{transform:scale(1.12);}

  .progress-wrap { flex:1; }

  input[type=range].progress-bar {
    -webkit-appearance:none;width:100%;height:6px;background:rgba(255,255,255,0.1);
    border-radius:3px;cursor:pointer;outline:none;margin-bottom:0.35rem;display:block;
  }
  input[type=range].progress-bar::-webkit-slider-runnable-track {
    background:linear-gradient(to right,var(--pink) 0%,var(--orange) var(--progress,0%),rgba(255,255,255,0.1) var(--progress,0%));
    height:6px;border-radius:3px;
  }
  input[type=range].progress-bar::-webkit-slider-thumb {
    -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--yellow);cursor:pointer;box-shadow:0 0 10px var(--yellow);transition:transform 0.15s;
  }
  input[type=range].progress-bar::-webkit-slider-thumb:hover{transform:scale(1.4);}

  .time-row { display:flex;justify-content:space-between;font-size:0.65rem;font-weight:700;color:rgba(255,255,255,0.35); }

  .vol-row { display:flex;align-items:center;gap:0.6rem;margin-top:0.9rem; }
  .vol-icon { font-size:0.9rem; }

  input[type=range].vol-bar {
    -webkit-appearance:none;width:90px;height:4px;background:rgba(255,255,255,0.12);
    border-radius:2px;cursor:pointer;outline:none;
  }
  input[type=range].vol-bar::-webkit-slider-thumb {
    -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 8px var(--cyan);cursor:pointer;
  }

  .visualizer { display:flex;align-items:flex-end;gap:3px;height:40px;margin-top:1.1rem;padding:0 2px; }
  .vbar { flex:1;border-radius:3px 3px 0 0;min-height:3px;transition:height 0.08s ease; }

  /* QR */
  .qr-section {
    background:rgba(13,13,26,0.85);border:2px solid rgba(255,255,255,0.1);
    border-radius:28px;padding:1.5rem;display:none;
    position:fixed; bottom:2rem; right:2rem; width:380px; max-width:90vw;
    z-index:10; overflow:hidden;
    backdrop-filter: blur(12px);
  }
  .qr-section.active { display:block; animation:popIn 0.5s 0.1s cubic-bezier(.175,.885,.32,1.275) both; }

  .qr-section::before {
    content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--green),var(--cyan),var(--blue),var(--pink));
    background-size:200%;animation:rainbowShift 2s linear infinite reverse;
  }

  .section-label {
    font-size:0.7rem;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;
    margin-bottom:1.2rem;display:flex;align-items:center;gap:0.6rem;
  }
  .label-dot {
    width:8px;height:8px;border-radius:50%;background:var(--green);
    box-shadow:0 0 10px var(--green);animation:blink 1.2s ease-in-out infinite;flex-shrink:0;
  }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.7);} }

  .qr-body { display:flex;align-items:center;gap:1.4rem; }

  #qr-code {
    background:white;padding:10px;border-radius:14px;flex-shrink:0;
    width:136px;height:136px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 3px var(--yellow),0 8px 30px rgba(255,230,0,0.3);
  }
  #qr-code canvas,#qr-code img { width:116px!important;height:116px!important; }

  .qr-right { flex:1;min-width:0; }
  .qr-title { font-size:1rem;font-weight:900;color:var(--white);margin-bottom:0.3rem; }
  .qr-hint { font-size:0.7rem;font-weight:600;color:rgba(255,255,255,0.4);line-height:1.5;margin-bottom:0.75rem; }

  .url-pill {
    display:block;background:rgba(0,245,160,0.08);border:1px solid rgba(0,245,160,0.25);
    border-radius:8px;padding:0.4rem 0.7rem;font-size:0.6rem;font-weight:700;
    color:var(--green);word-break:break-all;margin-bottom:0.8rem;letter-spacing:0.02em;
  }

  .btn-row { display:flex;gap:0.5rem;flex-wrap:wrap; }

  .btn {
    font-family:'Nunito',sans-serif;font-size:0.72rem;font-weight:800;
    padding:0.45rem 1rem;border-radius:999px;border:none;cursor:pointer;
    transition:all 0.2s;letter-spacing:0.05em;
  }
  .btn-pink { background:linear-gradient(135deg,var(--pink),var(--orange));color:white;box-shadow:0 4px 18px rgba(255,60,172,0.4); }
  .btn-pink:hover { transform:translateY(-2px) scale(1.04);box-shadow:0 8px 28px rgba(255,60,172,0.55); }
  .btn-outline { background:transparent;color:rgba(255,255,255,0.55);border:2px solid rgba(255,255,255,0.15); }
  .btn-outline:hover { border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px); }
  .btn-cyan { background:linear-gradient(135deg,var(--cyan),var(--green));color:#0d0d1a;box-shadow:0 4px 18px rgba(0,212,255,0.35); }
  .btn-cyan:hover { transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,245,160,0.45); }

  .custom-url-box { margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid rgba(255,255,255,0.08); }
  .input-label { font-size:0.62rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:0.5rem;display:block; }
  .input-row { display:flex;gap:0.5rem; }

  .url-input {
    flex:1;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);
    border-radius:12px;color:white;font-family:'Nunito',sans-serif;font-size:0.75rem;
    font-weight:600;padding:0.55rem 0.85rem;outline:none;transition:border-color 0.2s;
  }
  .url-input:focus { border-color:var(--cyan); }
  .url-input::placeholder { color:rgba(255,255,255,0.2); }

  @keyframes popIn {
    from{opacity:0;transform:scale(0.88) translateY(12px);}
    to{opacity:1;transform:scale(1) translateY(0);}
  }

  .footer {
    text-align:center;margin-top:2.5rem;font-size:0.65rem;font-weight:700;
    letter-spacing:0.15em;color:rgba(255,255,255,0.2);text-transform:uppercase;
    animation:popIn 0.6s 0.3s both;
  }
  .footer span {
    background:linear-gradient(90deg,var(--pink),var(--cyan));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
</style>
</head>

<audio id="audio-player"></audio>

<script>
  const audio = document.getElementById('audio-player');
  const progressBar = document.getElementById('progress-bar');
  const playBtn = document.getElementById('play-btn');
  const vinyl = document.getElementById('vinyl');
  let isPlaying = false, vizBars = [], vizInterval = null, currentQRUrl = '';

  // Build colorful visualizer bars
  const vizContainer = document.getElementById('visualizer');
  const vizColors = ['#ff3cac','#ff8c00','#ffe600','#00f5a0','#00d4ff','#4f46e5'];
  for (let i = 0; i < 32; i++) {
    const b = document.createElement('div');
    b.className = 'vbar';
    b.style.cssText = `height:3px;background:${vizColors[i%vizColors.length]};box-shadow:0 0 6px ${vizColors[i%vizColors.length]}`;
    vizContainer.appendChild(b);
    vizBars.push(b);
  }

  // Upload
  const zone = document.getElementById('upload-zone');
  const fileInput = document.getElementById('file-input');
  zone.addEventListener('click', () => fileInput.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('audio/')) loadTrack(f);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadTrack(e.target.files[0]); });

  function loadTrack(file) {
    audio.src = URL.createObjectURL(file);
    document.getElementById('track-name').textContent = file.name.replace(/\.[^/.]+$/, '');
    document.getElementById('track-meta').textContent =
      (file.type.split('/')[1]||'AUDIO').toUpperCase() + ' · ' + formatSize(file.size);
    audio.load();
    document.getElementById('player-card').classList.add('active');
    document.getElementById('qr-section').classList.add('active');
    generatePageQR();
    const emoji = zone.querySelector('.emoji-bounce');
    emoji.textContent = '🎉';
    setTimeout(() => emoji.textContent = '🎵', 1500);
  }

  function formatSize(b) { return b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'; }

  function togglePlay() {
    if (isPlaying) {
      audio.pause(); playBtn.textContent='▶'; vinyl.classList.remove('playing'); stopViz();
    } else {
      audio.play(); playBtn.textContent='⏸'; vinyl.classList.add('playing'); startViz();
    }
    isPlaying = !isPlaying;
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime/audio.duration)*100;
    progressBar.value = pct;
    progressBar.style.setProperty('--progress', pct+'%');
    document.getElementById('current-time').textContent = fmtTime(audio.currentTime);
  });
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('duration').textContent = fmtTime(audio.duration);
  });
  audio.addEventListener('ended', () => {
    isPlaying=false; playBtn.textContent='▶'; vinyl.classList.remove('playing'); stopViz();
  });

  function seekTo(v) { if (audio.duration) audio.currentTime=(v/100)*audio.duration; }
  function setVolume(v) { audio.volume=v/100; }
  function fmtTime(s) { return Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0'); }

  function startViz() {
    stopViz();
    vizInterval = setInterval(() => {
      vizBars.forEach((b,i) => {
        b.style.height = Math.max(3, 3+Math.random()*33+Math.sin(Date.now()/150+i*0.35)*8)+'px';
      });
    }, 70);
  }
  function stopViz() {
    if (vizInterval) clearInterval(vizInterval);
    vizBars.forEach(b => b.style.height='3px');
  }

  function generatePageQR() {
    currentQRUrl = window.location.href;
    buildQR(currentQRUrl);
    document.getElementById('qr-url-display').textContent = currentQRUrl;
  }
  function generateCustomQR() {
    const url = document.getElementById('custom-url').value.trim();
    if (!url) return;
    currentQRUrl = url;
    buildQR(url);
    document.getElementById('qr-url-display').textContent = url;
  }
  function buildQR(url) {
    const c = document.getElementById('qr-code');
    c.innerHTML = '';
    new QRCode(c, { text:url, width:116, height:116, colorDark:'#0d0d1a', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
  }
  function downloadQR() {
    const canvas = document.querySelector('#qr-code canvas');
    if (!canvas) return;
    const a = document.createElement('a');
    a.download='boombox-qr.png'; a.href=canvas.toDataURL('image/png'); a.click();
  }
  function copyURL(e) {
    navigator.clipboard.writeText(currentQRUrl).then(() => {
      const btn = e.target;
      btn.textContent='✅ Copied!';
      setTimeout(() => btn.textContent='⎘ Copy URL', 1500);
    });
  }
</script>
</body>
</html>
